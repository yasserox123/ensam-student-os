services:
  - type: web
    name: ensam-student-os-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    preDeployCommand: npx prisma migrate deploy
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ensam-db
          property: connectionString
      - key: CREDENTIALS_MASTER_KEY
        sync: false
    autoDeploy: true

databases:
  - name: ensam-db
    databaseName: ensam_lise
    user: ensam
    plan: free
