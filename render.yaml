services:
  - type: web
    name: ensam-student-os-api
    runtime: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ensam-db
          property: connectionString
      - key: CREDENTIALS_MASTER_KEY
        generateValue: true
    autoDeploy: true

  - type: web
    name: ensam-student-os-web
    runtime: static
    buildCommand: cd web && npm install && npm run build
    staticPublishPath: web/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://ensam-student-os-api.onrender.com/api/*
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://ensam-student-os-api.onrender.com

databases:
  - name: ensam-db
    databaseName: ensam_lise
    user: ensam
    plan: free
